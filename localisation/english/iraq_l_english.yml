 DoFE_IRQ_events.100.t: "Ministry Report on Foreign Diplomats"
 DoFE_IRQ_events.100.d: "The Ministry of Foreign Affairs has concluded its list of current foreign diplomats in Iraq;\n H.E. Sir Archibald John Clark Kerr - The United Kingdom\n H.E. Tahir Lutfi Bey - Turkish Republic\nH.E. Dr. Fritz Grobba - German Reich\n H.E. Monsieur Stanisław Hempel - Polish Republic\n H.E. Enayatollah Khan Samiy - Sublime State of Iran\n H.E. Baron Erik Gyllenstierna - Kingdom of Sweden\n H.E. Herr Charles Buchberger - Austrian Republic\n H.E. Monsieur Paul-Émile Lepissier - French Republic\n H.E. Mr. Paul Knabenshue - United States\n Commendatore Mario Porta - Kingdom of Italy\n M. Robert van de Kerchove d'Hallebast - Kingdom of Belguim\n H.E. Sheikh Ibrahim bin Muhammad Al-Muammar - Kingdom of Saudi Arabia\n H.E. Hassan Hafez Bey Amer - Kingdom of Egypt\n Monsieur Vladimir Fric - Czechoslovak Republic"
 DoFE_IRQ_events.100.a: "We have a Polish Representative?"

l_english:
 AME_the_first_FROM_constitutional_convention: "[FROM.GetNonIdeologyAdjectiveCap] Constitutional Convention"
 gen_adventures_in_politics_desc: "These are truly interesting times in which we live; whereas before, we could continue business as usual, nowadays, we must pick sides in the world upside down, taking and testing approaches unseen before. Our people are divided; their loyalties lie not with the state but with the thoughts of a radically different future. Some say we must remain loyal to the democratic model, others that socialism would be the best way forward, a third looks to Europe with a sparkle in their eyes, and the fourth looks at it with nothing but disgust. Worse yet, they are willing to tear each other apart, and fights are regular across the nation's cities. Henceforth, we must take a solid stance on what path we intend to take, for better or worse."
 AME_continue_the_democratic_expirement: "Continue the Democratic Expirement"
 gen_everlasting_liberty_desc: "We need not disturb the peace of our State; what we need now is a solid pace of change and reform, but it cannot be achieved without liberty, both political and economic. Democracy has been the greatest invention of mankind, and we intend to keep it that way. From now on, all political discourse shall be held by sound and sober discussion, as well as the power of the vote."
 gen_declare_rights: "Declare the Rights of Man"
 gen_entrench_democracy_desc: "The rule of law is a rather new concept to us, not to say a proper political etiquette and civil society. Of course, we must spread these values far and wide, integrate them into everyday life until even a child understands that our democracy is the only viable alternative for our nation to develop itself. We don't have a room, nor interest for the outlandish foreign ideals!"
 gen_begin_welfare: "For the Welfare of the People"
 gen_begin_welfare_desc: "We hold no illusions; the world has changed in these years, and it is moving much faster than we want to. It is therefore natural that we move in tune with the latest trends, or else we risk repeating the mistakes of our forefathers. Our rule shall truly be of the people, by the people, for the people! We shall be a caretaker state that yields the power of modern tech to bring prosperity to all!"
 gen_entrench_democracy: "Entrentch Democracy"
 gen_declare_rights_desc: "Every citizen of our state has inalienable rights. Right to speak, right to open business, right to move, and right to practice faith, amongst countless others. Their rights shall be respected without exceptions, and from these seeds of proper governance, soon a beautiful tree of liberty shall grow, for all our men and women to taste its fruits."
 gen_defend_freedoms: "Defend our Freedoms"
 gen_defend_freedoms_desc: "While every man his rights, he also has inaliable duties. Among those is the defense of their democratic Fatherland. We are not alone in this world, and our neighbors do not look keenly at us. We must accept that pacifism has no place in this world, lest we risk putting ourselves under a foreign yoke. Our State has allowed you to enjoy the fruits of your labor and choice, dear citizen; now, it rightfully asks you to fulfill your civic duty!"
 AME_return_to_true_americanism: "Return to True Americanism"
 gen_reactionary_modernity_desc: "Return to True Americanism!"
 

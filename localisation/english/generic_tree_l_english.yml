 gen_protect_conservative_values: "Uphold Conservative Values"
 gen_protect_conservative_values_desc: "We undoubtedly adhere to the principles of Liberty, Equality, and Fraternity, but we are not willing to go so far as to threaten the core values of our civilization. Reckless liberalism is what spawned socialists and futurists in the first place. God and Family are the twin sacred pillars that hold up our society, and thus no one should threaten them!"
 gen_trust_in_market: "Trust in the Market"
 gen_trust_in_market_desc: "Whatever those lunatics on both sides tell, the facts of basic economics stack up against them. We do not need ruinous experiments that bring nothing but poverty and misery. While not without its faults, we can safely bet that in due time, and with proper checks and balances, the invisible hand of the market shall unleash the productivity of unimaginable scale, putting Le Soleil and Tokyo to shame."

 ksr.142.t:0 "[FROM.GetNameDef] requests complete control"
 ksr.142.desc:0 "[FROM.GetLeader] has transmitted a message to us requesting that we hand over administration of [THIS.GetNameDef] over to them in the wake of war.\n\nWe can completely surrender all sovereignity to them, or agree to some form of autonomy under their wing."
 ksr.142.a:0 "The war effort requires complete subjugation."
 ksr.142.b:0 "We will fight with them side-by-side."
 
 ksr.143.t:0 "[SND.GetName] is collapsing"
 ksr.143.desc:0 "We have suspicions that [SND.GetLeader] of [SND.GetNameDef] might be planning to either abandon his armies or defect to the Japanese in the wake of his collapsing state. If the Japanese capture Shandong first, they will have an easier chance of integrating it for themselves.\n\nIf we want to prevent this, we need to send an ultimatum to [SND.GetNameDef] and order their immediate subjugation into [CHI.GetNameDef]."
 ksr.143.a:0 "Send the ultimatum."
 ksr.143.b:0 "Let them be. They might still survive."
 ksr.135.t:0 "[FLS.GetName]"
 ksr.135.desc:0 "The old French colonial empire has thrived in the New World for a long time, but with the rise of the British and the eventual birth of the United States – the once-mighty France sold the Louisiana territory to the Americans as a result of shifting power dynamics in the world. We can, however, revive our old colonial claims in America by re-establishing the colony once more."

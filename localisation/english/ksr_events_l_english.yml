 ksr.132.t:0 "Condominium of Bosnia-Herzegovina"
 ksr.132.desc:0 "Austria-Hungary used to be a very diverse empire not only ethnically, but also administratively. In the latest stages of the Habsburg empire, the Bosnian state has enjoyed special autonomy. We might want to consider returning it so that the Bosnians are not kept in the shadows."

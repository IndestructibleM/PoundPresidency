l_english:
# REPLACEMENTS AND SUPPLEMENTS FOR VANILLA
 germany.55.e:0 "Establish Protektorat Böhmen-Mähren and satellite Slovakia"
 germany.1002.LIT.desc:0 "We have received a diplomatic message from Berlin concerning our current territorial occupation of lands in Eastern Poland. It appears that [GER.GetNameDef] and [SOV.GetNameDef] have signed a so-called secret Molotov-Ribbentrop Pact which divides Poland into two spheres of influence, and our occupation interferes with their plans.\n\nThe [GER.GetAdjective] and [SOV.GetAdjective] governments have decided to acknowledge our historical claims on the Vilnius Region, promising to allow us to continue occupying any territories within the bounds of our constitutional borders which we have claimed since 1920, but we are to give up any Polish land beyond these borders.\n\nShould we reject this, we may find ourselves at war with [GER.GetNameDef] and [SOV.GetNameDef] in the immediate future."
 LIT_events.1.d:0 "It is abundantly clear that [LIT.GetLeader] seeks to reunify the [LIT.GetAdjective] state with its old capital Vilnius and their 1920 claimed borders. Clearly posing very little threat to [POL.GetNameDef] by themselves, the [LIT.GetAdjective]s seek to partition the nation with [Root.GetNameDef], with [POL.GetAdjective] Ukraine and Belarus joining with [Root.GetNameDefCap] and the Vilnius Region returning to [LIT.GetNameDef].\n\n[POL.GetNameDefCap] can of course refuse the joint-ultimatum and such refusal would result in a state of war between [POL.GetNameDef] and [Root.GetNameDef]."
 LIT_events.101.d:0 "Ever since 1920, Wilno has been under the control of [Root.GetNameDef], much to the constant aggravation of [LIT.GetNameDef] who sees the city and its region as rightful land of their nation. Tensions, however, have reached a boiling point and with the assistance of none other than [SOV.GetLeader], the Lithuanians now demand that Eastern Poland be partitioned between the [SOV.GetAdjective]s and Lithuania. Should we accept, we will surrender the entirety of Eastern Poland, but should we refuse; we will find ourselves the prime target of a [SOV.GetAdjective]-[LIT.GetAdjective] coalition."
 LIT_events.3.d:0 "The point of contention between [Root.GetNonIdeologyName] and [From.GetNonIdeologyName] for the past decade has been the [Root.GetAdjective] occupation of [From.GetNonIdeologyName]’s traditional capital of Vilnius. Now that the two nations are in cordial relations, [From.GetLeader] proposes a state of perpetual peace on the condition that [Root.GetNameDef] surrenders control of the Vilnius Region and abandons all claims to [From.GetAdjective] territory. Refusal would be a disappointment, but would not result in [From.GetNonIdeologyName] pursuing war with [Root.GetNameDef], claims [From.GetLeader]."
 LIT_events.5.t:0 "[From.GetNameDefCap] Demands Vilnius Region"
 LIT_events.5.a:0 "It is useless land. Take it."
 LIT_events.501.t:0 "Vilnius Region returned!"
 LIT_events.501.desc:0 "[From.GetNameDefCap] has agreed to the peaceful return of Vilnius Region lands, marking one step closer to better diplomatic relations between our countries. With the return of these lands, Lithuania comes closer to securing their 1920 borders."
 LIT_events.502.desc:0 "Unsurprisingly, [From.GetNameDef] has refused [Root.GetLeader]’s demands to cede Vilnius Region lands back to [Root.GetNameDef]. Although diplomacy has failed, [Root.GetLeader] has yet to rule out the possibility of war, and with tensions rising on the border, war seems inevitable."
 south_american_events.21.desc: "[ECU.GetNameDefCap] has responded positively to our proposed white peace. Regrettably it has come at a high price, as we have ceded Putumayo to the [ECU.GetAdjective] leadership."








 # CUSTOM KSR EVENTS
 ksr.1.t:0 "The Transnistria Question"
 ksr.1.desc:0 "The Wehrmacht is currently in control of territory that composes the region of Transnistria in the ethnic borderlands of Ukraine and Romania. This territory is of limited importance to us, but seems to be important to others.\n\nThe Romanian government has been eyeing Transnistria as a potential expansion prize.\n\nWhat should we do with Transnistrian lands?"
 ksr.1.a:0 "Transfer to [ROM.GetNameDef]"
 ksr.1.b:0 "Keep the territory for ourselves."
 
 ksr.2.t:0 "Far Eastern Lands"
 ksr.2.desc:0 "Our military has solidified control over lands composing the Vladivostok-Khabarovsk region. The government has provided several alternative options for the future of this territory that don't necessarely involve us keeping it.\n\nJapan has been a strategic ally of ours during the Interwar period, and their country has a bloody history with the Russians that they likely want to resettle.\n\nOn the other hand, our advisors are suggesting we incorporate these territories into potential Reichskommissariat Ferner Osten districts.\n\nWhat should we do with Vladivostok-Khabarovsk?"
 ksr.2.a:0 "Send the offer to [JAP.GetNameDef]"
 ksr.2.b:0 "Keep the territory for ourselves."
 
 ksr.3.t:0 "The Sakhalin Question"
 ksr.3.desc:0 "The German armies have a foothold on the island of Sakhalin, however this territory presents a geopolitical issue. After the Russo-Japanese War in 1905, the government of Tokyo has annexed the southern part of Sakhalin, dividing the island into two for several decades.\n\nThe Japanese have had a claim on the rest of Sakhalin since their last confrontation with the Russian Empire, and they probably intend on holding onto this claim.\n\nContrary to this, our government officials state that Sakhalin should be incorporated as a potential Reichskommissariat Ferner Osten district.\n\nWhat should we do with Sakhalin?"
 ksr.3.a:0 "Send the offer to [JAP.GetNameDef]"
 ksr.3.b:0 "Keep the territory for ourselves."
 
 ksr.4.t:0 "[FROM.GetName] offers Transnistrian territory"
 ksr.4.desc:0 "It seems that the government of [FROM.GetLeader] has assessed that they have no important use for the territory between the Dniester and Bug rivers.\n\nThat being said, we can incorporate this territory into our own country as a continuation of the 1918 expansion of Romania.\n\nShould we take this territory?"
 ksr.4.a:0 "We'll take it."
 ksr.4.b:0 "We don't want it. Atleast for now."
 
 ksr.5.t:0 "[FROM.GetName] rejects offer for territory"
 ksr.5.desc:0 "It seems that the [FROM.GetAdjective] government does not seek to administer this Transnistrian territory. Their stated reasons remain vague, but they might be interested in the offer sometime later."
 ksr.5.a:0 "Who doesn't want more territory?"
 
 ksr.6.t:0 "The Karelian North"
 ksr.6.desc:0 "Karelian lands have succumbed to Russian rule a very long time ago, and this is the first time in centuries when foreign troops set foot in this land.\n\n[FIN.GetName] has been eyeing Karelia ever since their independence in 1917. Transfering this territory to them would greatly improve our diplomatic relations.\n\nOn the other hand, Karelia also serves as an extension of a potential Reichskommissariat Moskowien which we could establish authority over with our satellite leaders.\n\nWho should Karelia belong to?"
 ksr.6.a:0 "Transfer to [FIN.GetNameDef]"
 ksr.6.b:0 "Keep the territory for ourselves. For now."
 
 ksr.7.t:0 "[FROM.GetName] offers to transfer Karelian lands"
 ksr.7.desc:0 "[FROM.GetLeader] has sent us a diplomatic message suggesting we march in with our troops and secure the Karelian territory for ourselves.\n\nAlthough Karelia can be an integral part of [THIS.GetNameDef], we must evaluate this decision carefully to avoid potentially harmful international consequences.\n\nShould we take this territory?"
 ksr.7.a:0 "Karelia is [THIS.GetNameDef]!"
 ksr.7.b:0 "We do not need this territory at the moment."
 
 ksr.8.t:0 "[FROM.GetName] declines our offer for Karelia"
 ksr.8.desc:0 "News have arrived from [FROM.GetCapital] that the [FROM.GetAdjective] government has respectfully declined our offer for the transfer of Karelia to them. The circumstances of this decision are very vague, but there is nothing we can do."
 ksr.8.a:0 "This may have been their last chance."
 
 ksr.9.t:0 "[FROM.GetName] accepts our offer for Karelia"
 ksr.9.desc:0 "An agreement has been made between our governments and the transfer of administrative bodies has already begun. The [FROM.GetAdjective] have thanked us for this gesture and addressed it as a fruitful step towards greater relations between our nations."
 ksr.9.a:0 "Good for them."
 
 ksr.10.t:0 "The Flag of the Empire"
 ksr.10.desc:0 "The empire has returned and we are faced with multiple constitutional challenges. Although it would be simpler to restore every aspect of our country as it was before The Great War, we may want to take on some changes.\n\nA. The official flag of the German Empire was the tricolor that we have readopted in our struggle against fascism and is the most widely recognized German flag.\n\nB. The war flag of the German Empire has always symbolized Germany's military power and stands for our true pride and history.\n\nC. The old war flag of 1848 represented the very first attempt at a German Empire way before the actual unification in 1871.\n\nD. The imperial tricolor can be kept as is, but additionally with our coat of arms in the middle.\n\nWhat flag should we choose for the new Kaiserreich?"
 ksr.10.a:0 "A. The Imperial Tricolor."
 ksr.10.b:0 "B. Reichskrieggsflagge."
 ksr.10.c:0 "C. Old Reichskrieggsflagge."
 ksr.10.d:0 "D. Imperial Flag with coat of arms."
 
 ksr.11.t:0 "The Flag of the Empire"
 ksr.11.desc:0 "Centuries of Russian history are symbolized by the current tricolor flag, but a new chapter is being written with the expulsion of communists and their sympathisers from the motherland. Officials of the Kremlin have laid out several proposals for a new flag that we might want to consider.\n\nA. The plain tricolor has been in use before The Great War and stands as the last official flag of the Russian Empire which could be kept the way it was.\n\nB. The tricolor with the canton has been the proposed flag for the empire in the case of Russian victory in The Great War, which never came to realization.\n\nC. The black-gold-white tricolor has been personally adopted by Tsar Alexander II in 1858 and used for almost the remainder of the century.\n\nD. The black-gold-white flag can be remade to include the Imperial Standard in the middle, which would be an entirely new flag that was never officially used before.\n\nWhat flag should we adopt for the newly reconstructed Russian Empire?"
 ksr.11.a:0 "A. Keep the current one."
 ksr.11.b:0 "B. Planned tricolor with imperial coat of arms."
 ksr.11.c:0 "C. Black-gold-white."
 ksr.11.d:0 "D. Black-gold-white with Imperial Standard."
 
 ksr.12.t:0 "Capital of the Empire"
 ksr.12.desc:0 "The dissolvement of Austria-Hungary in 1918 left with it a lot of breakaway states who wanted to go their own seperate ways, but this was never an option under the strong grip of the Habsburgs from Vienna. Their reputation of power proceeded them well.\n\nShould we relocate our government to where the House of Habsburgs is, or shall we keep the capital as it is?"
 ksr.12.a:0 "Move the capital to Vienna!"
 ksr.12.b:0 "These are unnecessary changes."
 
 ksr.13.t:0 "[FROM.GetName] demands Southern Jutland"
 ksr.13.desc:0 "The government of [FROM.GetLeader] has sent us a concerning diplomatic message suggesting we hand them the territory of Southern Jutland without a fight, or they will forcefully come and seize it.\n\nSouthern Jutland was taken from the German Empire and assigned to Denmark during the Treaty of Versailles in 1919, and it seems that [FROM.GetLeader] is now attempting to restore old German territories.\n\nShould we cede them Southern Jutland or risk war?"
 ksr.13.a:0 "Concede to [FROM.Adjective] demands."
 ksr.13.b:0 "We will not move one centimeter."
 
 ksr.14.t:0 "[FROM.GetName] transfers Southern Jutland"
 ksr.14.desc:0 "Great news from our diplomatic mission in [FROM.capital.GetCapitalVictoryPointName] informing us that [FROM.GetAdjective] troops are now withdrawing from all of their locations in Southern Jutland.\n\nOur territorial disputes with [FROM.GetNameDef] seem to be settled for now."
 ksr.14.a:0 "The Treaty of Versailles is null and void."
 
 ksr.15.t:0 "[FROM.GetName] refuses to transfer Southern Jutland"
 ksr.15.desc:0 "It seems that the government of [FROM.GetNameDef] has made a rather daring attempt at calling our bluff - refusing to transfer Southern Jutland back to us. Unfortunately, the only remaining option is to retake the territory by force, and should we do it - we might aswell not stop at Southern Jutland."
 ksr.15.a:0 "This was their last mistake."
 
 ksr.16.t:0 "The Flag of [FROM.GetNameDef]"
 ksr.16.desc:0 "The late Austro-Hungarian Empire which fell in 1918 was an administratively diverse country. Several flags were used to represent it, however only one can be used by us for international purposes.\n\nA. The former civil ensign of the empire can be maintained. The most common feature of it is the clear representation of the two most important constituent entities of the country - both Austria and Hungary.\n\nB. The same civil ensign can be outfitted with the official coats of arms of both nations, producing a more detailed flag.\n\nC. The black-gold variant is the classic flag of the House of Habsburgs and a very old one. It has been extensively used up until the fall of the empire at the beginning of the 20th century.\n\nD. The Habsburg flag with a coat of arms variant is the same black-gold flag but with the lesser coat of arms of the House of Habsburgs. This flag could be used to represent the power and influence of our centuries-old dynasty.\n\nWhat flag should we adopt for [FROM.GetNameDef]?"
 ksr.16.a:0 "A. Keep the current one."
 ksr.16.b:0 "B. National civil ensign."
 ksr.16.c:0 "C. Habsburg flag."
 ksr.16.d:0 "D. Habsburg flag with Imperial coat of arms."
 
 ksr.17.t:0 "[FROM.GetName] offers Vladivostok-Khabarovsk lands"
 ksr.17.desc:0 "The government of [FROM.GetLeader] from [FROM.GetNameDef] have sent us a diplomatic message through our ambassadors with a one-way proposal.\n\nThey believe that their control over lands in the Vladivostok-Khabarovsk region stretches their supply lines and creates logistical issues - rendering their occupation troublesome. However, the [FROM.GetAdjective] government believes leasing this territory to us in exchange for more favorable diplomatic relations was the option to take.\n\nShould we accept and have Vladivostok-Khabarovsk territories transferred to us?"
 ksr.17.a:0 "Yes. We need this territory."
 ksr.17.b:0 "We are not interested."
 
 ksr.18.t:0 "[FROM.GetName] declines our offer for Vladivostok-Khabarovsk"
 ksr.18.desc:0 "In an unexpected turn of events, the [FROM.GetAdjective] has kindly turned down our proposal - stating that this land is of no interest to them at this time."
 ksr.18.a:0 "We'll find something else to do with it."
 
 ksr.19.t:0 "[FROM.GetName] offers Sakhalin"
 ksr.19.desc:0 "We have received a diplomatic message from the [FROM.GetAdjective] embassy in [ROOT.GetNameDef] about a proposal to reunite lands of the Sakhalin island with our country. Knowing our historical claims on the region, [FROM.GetNameDef] is willing to transfer this territory to us in exchange for better diplomatic relations.\n\nShould we accept this territory or inform the ambassador that we are not interested?"
 ksr.19.a:0 "Sakhalin is ours!"
 ksr.19.b:0 "For now we are not interested."
 
 ksr.20.t:0 "[FROM.GetName] declines our offer for Sakhalin"
 ksr.20.desc:0 "The [FROM.GetAdjective] government has unexpectedly turned down our offer for Sakhalin, stating that they are not ready to take control over the island for now. They have, however, thanked us for the gesture."
 ksr.20.a:0 "Didn't they claim it?"
 
 ksr.21.t:0 "[FROM.GetName] have accepted our transfer offer"
 ksr.21.desc:0 "The leader of [FROM.GetNameDef], [FROM.GetLeader], has formally thanked us for transferring the territory over to them as they are in the process of seizing it administratively.\n\nHopefully this ensures a positive turn in [THIS.GetAdjective]-[FROM.GetAdjective] diplomatic and national relations."
 ksr.21.a:0 "Good for them."
 
 ksr.22.t:0 "The North American Division Plan"
 ksr.22.GER.desc:0 "Our troops have managed to secure some North American territory which is a great achievement. Given this recent conquest, however, the government came up with an ambitious secret project.\n\nOur top officials and generals have come together and proposed the plan to divide North America between ourselves and the Japanese, currently mostly concerning American and Canadian land.\n\nThe proposal entails establishing a no-go Neutral Zone in the Rocky Mountains which we would agree to leave alone in order to avoid border conflicts.\n\nGermany would secure territories to the East of the Rocky Mountains, while Japan would establish control over everything West of the range.\n\nShould we send this proposal to our potential partners in [JAP.GetNameDef]?"
 ksr.22.JAP.desc:0 "Our troops have managed to secure some North American territory which is a great achievement. Given this recent conquest, however, the government came up with an ambitious secret project.\n\nOur top officials and generals have come together and proposed the plan to divide North America between ourselves and the Germans, currently mostly concerning American and Canadian land.\n\nThe proposal entails establishing a no-go Neutral Zone in the Rocky Mountains which we would agree to leave alone in order to avoid border conflicts.\n\nGermany would secure territories to the East of the Rocky Mountains, while Japan would establish control over everything West of the range.\n\nShould we send this proposal to our potential partners in [GER.GetNameDef]?"
 ksr.22.a:0 "Yes, absolutely!"
 ksr.22.b:0 "No. We have other plans."
 KSR_is_neutral_zone_american_state_tt:0 "Is German-Japanese North American division state."
 
 ksr.23.t:0 "[FROM.GetName] proposes the North American Division Plan"
 ksr.23.desc:0 "The [FROM.GetAdjective] embassy has sent diplomats to our top government quarters to propose a plan that would divide North America between our two countries.\n\nThe proposal entails establishing a no-go Neutral Zone in the Rocky Mountains which we would agree to leave alone in order to avoid border conflicts.\n\nGermany would secure territories to the East of the Rocky Mountains, while Japan would establish control over everything West of the range.\n\nShould we agree to this proposal sent to us by the [FROM.GetAdjective] government?"
 ksr.23.a:0 "Yes. This is a great idea."
 ksr.23.b:0 "No. We cannot trust them."
 
 ksr.24.t:0 "[FROM.GetName] has agreed to the North American Division Plan"
 ksr.24.desc:0 "It appears that our partners in [FROM.GetName] have been delighted to hear of such a proposal and gladly agreed to it.\n\nWe will, however, need to hold onto our obligations and respect the spheres of influence, aswell as the territories of the Neutral Zone once it is established."
 ksr.24.a:0 "North America is ours!"
 
 ksr.25.t:0 "[FROM.GetName] has rejected our North American Division Plan"
 ksr.25.desc:0 "The [FROM.GetAdjective] delegation has relayed to us the unfortunate news that their government rejects the plan to divide North America."
 ksr.25.a:0 "Fine. We'll take it ourselves."
 
 ksr.26.t:0 "Transfer [1148.GetName]"
 ksr.26.desc:0 "Sobrance is a small strip of land in the Carpathian mountain range that the Hungarians have been eyeing for a while. This territory is of limited use to us, and there is a high probability at increasing relations with [HUN.GetNameDef] if we offer this territory to them.\n\nWhat should we do with [1148.GetName]?"
 ksr.26.a:0 "Send the offer to [HUN.GetNameDef]."
 ksr.26.b:0 "We'll keep it."
 
 ksr.27.t:0 "[FROM.GetName] offers [1148.GetName]"
 ksr.27.desc:0 "The [FROM.GetAdjective] government has relayed a message to us offering the small province of [1148.GetName]. It used to be our territory for hundreds of years, and the offerers think of it as a kind gesture in return of better diplomatic relations.\n\nShould we accept this transfer?"
 ksr.27.a:0 "Of course!"
 ksr.27.b:0 "They can keep it."
 
 ksr.28.t:0 "[FROM.GetName] have declined our transfer offer"
 ksr.28.desc:0 "The [FROM.GetAdjective] government has sent us a diplomatic message kindly declining our offer to transfer them territory. They did not manage to provide clear reasons why, but thanked us for the gesture regardless."
 ksr.28.a:0 "Their loss."
 
 ksr.29.t:0 "The Flag of [ROOT.GetNameDef]"
 ksr.29.desc:0 "The recent restoration of [ROOT.GetNameDef] has sparked a lot of intra-governmental discussion in regards to the official symbols of the country, especially given that even during the last days of the Polish-Lithuanian Commonwealth in 1795, the republic did not use a flag of today's standards. Our officials have come up with a few proposals for a new flag.\n\nA. This flag maintains the color scheme of the same old war banner of the Commonwealth, but adopts the new shield consisting of the tripartite Polish-Lithuanian-Ruthenian joint coat of arms used during the January Uprising of 1863.\n\nB. This flag is a restoration of the flag used during the January Uprising in the last century, but adopts an originally unused crown on top of the tripartite shield.\n\nC. The old historical shield consisting of the Eagle and the Vytis would return to the red-white-red color scheme slightly off center to the left side, replicating the proportions of the old war banners.\n\nD. Very similar to the aforementioned, this flag would utilize a more detailed historical shield using the same Eagle and Vytis combination.\n\nWhat flag should we adopt for the new [ROOT.GetNameDef]?"
 ksr.29.a:0 "A. Red-white-red with uprising shield."
 ksr.29.b:0 "B. Uprising flag with a crown."
 ksr.29.c:0 "C. Red-white-red with off-centered historical shield."
 ksr.29.d:0 "D. Red-white-red with detailed off-centered historical shield."
 
 ksr.30.t:0 "The Korean Division Plan"
 ksr.30.desc:0 "The war with [JAP.GetNameDef] is costly, though the conclusion of it may not mark the end of imperialist conquests in Asia. Our advisors fear that the communists are preparing to take over the entire continent, including the Korean peninsula.\n\nThe Koreans have long lived under brutal Japanese subjugation, however the situation for this nation might not take a lighter turn under potentially oppressive communist regimes. Our advisors recommend a plan to contain the spread of communism to at least the southern half of Korea, which would be easier to negotiate than for the entirety of it.\n\nThe ideal plan is to divide the peninsula along the 38th parallel to simply avoid excrutiating border negotiations. Should we negotiate dividing Korea by sending a proposal to the enemy of our enemy?"
 ksr.30.a:0 "Send this proposal to them."
 ksr.30.b:0 "We do not want two Koreas."
 
 ksr.31.t:0 "The Korean Division Plan"
 ksr.31.desc:0 "The Americans have come forward with a proposal. They seek to divide the Korean peninsula along the 38th parallel after it is liberated from the Japanese imperialists, and they are offering us the northern side.\n\nIt seems that they are concerned with the spread of the revolution, and we are not to forget that [USA.GetNameDef] are our ideological enemies. However, seizing all of Korea for ourselves could cause problems in the sense of balanced war gains from our common struggle against [JAP.GetNameDef]. Needless to say, the Americans might go to war with us over this.\n\nIf we accept this proposal, we will become obligated to hand over any territory south of the 38th parallel to the American military occupation authorities - as would they with any northern territories. What shall we do?"
 ksr.31.a:0 "Accept it. It is only fair for both sides."
 ksr.31.b:0 "No. All of Korea will be liberated!"
 
 ksr.32.t:0 "The Korean Division Plan"
 ksr.32.desc:0 "The communists have accepted the division plan. They will be obligated to transfer any southern territory to us as we are to do the same with any northern territory."
 ksr.32.a:0 "South Korea is safe!"
 
 ksr.33.t:0 "The Korean Division Plan"
 ksr.33.desc:0 "Negotiations failed! [FROM.GetNameDef] has declined the plan, and since they control a portion of the Korean peninsula - we cannot force them out of the negotiation. If this war drags on for another year, we may try again.\n\nFor now, it looks like Korea's fate is anyone's guess."
 ksr.33.a:0 "What a waste..."
 
 ksr.34.t:0 "The Korean Division Plan"
 ksr.34.desc:0 "We are currently in full control of some or all Korean territory above the 38th parallel. Per our agreement with the communists, we are required to hand the territory over to them."
 ksr.34.a:0 "Circumstances changed. They won't get it."
 ksr.34.b:0 "Give it to them. We keep our promises."
 
 ksr.35.t:0 "The Korean Division Plan"
 ksr.35.desc:0 "[FROM.GetName] have transferred all Korean territory above the parallel over to our direct administration. It seems the Americans are honoring the agreement."
 ksr.35.a:0 "Splendid."
 
 ksr.36.t:0 "The Korean Division Plan"
 ksr.36.desc:0 "[FROM.GetName] have refused to transfer all Korean territory above the parallel over to our direct administration. This is in violation of the agreement and justifies military action."
 ksr.36.a:0 "We will use force if need be."
 
 ksr.37.t:0 "The Korean Division Plan"
 ksr.37.desc:0 "We are currently in full control of some or all Korean territory below the 38th parallel. Per our agreement with the Americans, we are required to hand the territory over to them."
 ksr.37.a:0 "Circumstances changed. They won't get it."
 ksr.37.b:0 "Give it to them. We keep our promises."
 
 ksr.38.t:0 "The Korean Division Plan"
 ksr.38.desc:0 "[FROM.GetName] have transferred all Korean territory below the parallel over to our direct administration. It seems the communists are honoring the agreement."
 ksr.38.a:0 "Splendid."
 
 ksr.39.t:0 "The Korean Division Plan"
 ksr.39.desc:0 "[FROM.GetName] have refused to transfer all Korean territory below the parallel over to our direct administration. This is in violation of the agreement and justifies military action."
 ksr.39.a:0 "We will use force if need be."
 
 ksr.40.t:0 "Rename [SIA.GetNameDef] to Thailand"
 ksr.40.desc:0 "Siam has a great history. It stands as the only nation in the entire region not to be colonized by a Western power. Ever since the 1932 revolution, more and more Thai people are patriotic about their homeland. We can take this one step further.\n\nOur advisors are keenly supportive of the idea about renaming [SIA.GetNameDef] to Thailand - a name which means "land of the free", because that is what the Thai people really are."
 ksr.40.a:0 "For nation, religion and king."
 
 ksr.41.t:0 "Transfer [1385.GetName] and [1386.GetName]"
 ksr.41.desc:0 "The small Polish states of [1385.GetName] and [1386.GetName] have been contested by the Czechoslovakians in the early 1920's, and historical maps place them within the boundaries of the late Kingdom of Hungary from the Great War era.\n\nWhile these areas are insignificant to us, they might hold symbolic value for our [71.OWNER.GetAdjective] allies and might improve our relations even further.\n\nShould we transfer some of these territories to [71.OWNER.GetNameDef]?"
 ksr.41.a:0 "Offer to [71.OWNER.GetNameDef]"
 ksr.41.b:0 "We'll keep it for now."
 
 ksr.42.t:0 "[FROM.GetName] offers southern Polish territories"
 ksr.42.desc:0 "[GER.GetAdjective] diplomats have approached us with a proposal to transfer some territories around [1385.GetName] and [1386.GetName] over to us. These territories belonged to our realm before the conclusion of the Great War, therefore there is some historic justification.\n\nShould we accept this offer?"
 ksr.42.a:0 "Of course!"
 ksr.42.b:0 "We don't need these lands."
 
 ksr.43.t:0 "[FROM.GetName] rejected our offer for territories"
 ksr.43.desc:0 "It seems that the [FROM.GetAdjective] government is not interested in our proposal at this time."
 ksr.43.a:0 "Their loss."
 
 ksr.44.t:0 "Uncensored §RNSDAP§! Symbols"
 ksr.44.desc:0 "Uncensored German NSDAP symbols have been enabled by the host's game rules and will take effect shortly.\n\nIf you prefer to not compromise yourself to public censorship laws, be sure to either leave the game or make sure the game is restarted with the 'Uncensored NSDAP Symbols' setting disabled in the game rules.\n\n§RNOTE:§! In case of multiplayer, the symbols will be enabled when all players acknowledge this prompt."
 ksr.44.a:0 "Acknowledge"
 
 ksr.45.t:0 "Mongols Request Self-Governance with IJA's Blessing"
 ksr.45.desc:0 "General Jirō Minami has informed Tokyo that local collaborationist Prince Demchugdongrub is ready to establish a closely loyal Mongol Military Government with [JAP.GetAdjective] army oversight in the Chahar province of China. While this would loosen our direct administration, it would also provide an opportunity for anti-Kuomintang sentiment to grow inside of Inner Mongolia - a great potential for a useful ally.\n\nIf we refuse, the Imperial Japanese Army might face difficulties maintaining stability in Chahar in the long term. Not to mention, General Minami's authority and that of the rest of the IJA would be considered neglected - driving a bigger wedge between the Army and the Navy.\n\nShould we establish an autonomous Mongol Military Government loyal to [JAP.GetNameDef]?"
 ksr.45.a:0 "Yes. The Mongols are our allies."
 ksr.45.b:0 "No. Instead, transfer Chahar to Manchuria."
 ksr.45.c:0 "No. We can't loosen our grip over the Mongols."
 
 ksr.46.t:0 "[FROM.GetName] Transfers Chahar to Manchuria"
 ksr.46.desc:0 "The [FROM.GetAdjective] government has seen fit to transfer us the former Chinese province of Chahar. It appears that the local Mongols attempted to gain autonomy, but our overlods decided that we should integrate them with the rest of Inner Mongolia that is already under our control."
 ksr.46.a:0 "We'll take it."
 
 ksr.47.t:0 "Protectorate of Bohemia and Moravia"
 ksr.47.desc:0 "The Czechs are closely tied to us, however these historical Slavic neighbors might warrant their own self-governance. [RBM.GetLeader] is ready to cooperate with [GER.GetNameDef] to help rule over the Bohemian and Moravian lands."

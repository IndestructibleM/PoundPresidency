 ksr.110.t:0 "Honor the North American Division Plan"
 ksr.110.desc:0 "The signatory party that was on the other side of the table has requested through diplomats that our agreement be honored and that we hand over territories belonging outside our sphere of influence.\n\nOur agreement stipulates that our border ends at the Rocky Mountains with a mutually-agreed Neutral Zone. Should we decide not to transfer the required territories, we could find ourselves at war very soon."
 ksr.110.a:0 "Transfer the land. They are our allies."
 ksr.110.b:0 "No. We have other plans."
 
 ksr.111.t:0 "Our signatory partners have betrayed us!"
 ksr.111.FROM.desc:0 "It appears that [FROM.GetNameDef] has blatantly refused to transfer territories outside their agreed sphere of influence in North America. It is possible that the other side is testing us and wishing that we back down.\n\nWe have an option to go to war immediately based on a justified diplomatic reason, or we can let the [FROM.GetAdjective] government keep whatever they are holding but rendering our agreements null and void."
 ksr.111.a:0 "This is outrageous. Prepare for war."
 ksr.111.b:0 "Traitors. We'll bide our time."
 
 ksr.112.t:0 "Our partners honor the treaty and transfer territory."
 ksr.112.desc:0 "Our signatory partners in [FROM.GetNameDef] have transferred all North American territory that was outside their sphere of influence.\n\nWhile some of our advisors were skeptical in regards to the integrity of this written agreement, our strategic ally has proven itself to be trustworthy... for now."
 ksr.112.a:0 "Splendid."
 
 ksr.113.t:0 "Reichskommissariat Skandinavien"
 ksr.113.desc:0 "Our initial plans for Norway may need to be expanded across all of Scandinavia. The Swedish pride themselves in great history and the Finns have a remarkable fighting spirit, though it is time to consider the possibility that their best interests are in alignment with [GER.GetNameDef] in a deeply integrated fashion."

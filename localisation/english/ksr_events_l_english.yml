 ksr.107.desc:0 "The sparsely-populated Rocky Mountains divide the American nation into two parts, and the one on the Eastern seaboard is a lot more populated and developed. It could be in the Pacific West's best interest to break off and have a chance at more autonomous development, and surely [JAP.GetNameDef] will have access to large swaths of natural resources."
 ksr.107.a:0 "Establish [JPS.GetNameDef]"
 ksr.107.b:0 "Manage Territories"

SYR_political_events.1.t:0 "Forty-Day Memorial in Aleppo" 
SYR_political_events.1.d:0 "In Aleppo, the forty-day memorial of Ibrahim Hanunu has drawn thousands into the streets. As the leader of the Aleppo Revolt, his death has left a void in the northern resistance. The gathering was not merely one of mourning, but a defiant display of Syrian nationalism against the Mandatory authorities. The crowds are calling for the fulfillment of Hanunu's dream; a unified and independent Syria."
SYR_political_events.1.a:0 "His legacy lives on in our struggle."
SYR_political_events.2.t:0 "Hanunu Memorial in Damascus" 
SYR_political_events.2.d:0 "On January 10th, the National Bloc held a massive memorial at the Syrian University. Attended by over two thousand people, including delegations from Aleppo, Homs, Hama, Beirut, and the Golan, the event was a definitive display of unity. The service started with a recital of the Quran, followed by the Orators, Hashim Al-Attasi, Naguib Al-Reis, Dr. Abdulrahman Al-Kayali, Isa'af Al-Nashabibi with poet Shafeeq Al-Jabri who recited a poem he made in honour of Hanunu. At the end of the service, the Bloc officially announced its 'National Charter,' declaring that the era of compromise with the French has ended in favor of a policy of relentless resistance and feeding the people's soul with the spirit of enthusiasm and encourge them to demand and sacrfice for their Homeland. Simultaneously, the National Bloc called to boycott the French-run electricity and tramway companies basically paralyzing the city. There is only a single chant that echoes across Damascus todays; Death to France, Long Live Syria!."
SYR_political_events.2.a:0 "The Era of Compromise is over!"

USA_roosevelt_lives_desc:0 "The whispers of weakness have been silenced forever. By miracle or destiny, Franklin Delano Roosevelt has risen renewed, standing upright before a stunned nation. America now witnesses not merely recovery, but resurrection. Roosevelt lives, and through him the Republic itself is reborn."

USA_overwhelming_executive_orders_desc:0 "The nation demands action, not hesitation. The President's will shall flow through the state like a great current, sweeping aside obstruction and doubt. With decisive orders, the machinery of America will move with unity and purpose."

USA_declare_martial_law_desc:0 "In times of uncertainty, the nation must close ranks behind its leader. Discipline and order will replace confusion and unrest. Under martial law, the Republic stands vigilant, guarded by the strength of its defenders."

USA_pack_the_supreme_court_desc:0 "The law must serve the living nation, not the dead weight of outdated interpretation. New guardians of justice will take their seats upon the bench. The courts shall now reflect the spirit of Roosevelt’s America."

USA_godels_loophole_desc:0 "Even the oldest charters contain hidden paths. With wisdom and foresight, the President has discovered the means to guide the Republic beyond the paralysis of old constraints. Through law itself, a new destiny will unfold."

USA_rule_by_executive_decree_desc:0 "The voice of the President speaks for the unity of the nation. Where once there was delay and division, there will now be clarity and command. His decrees will guide America forward without hesitation."

USA_republic_without_democracy_desc:0 "The Republic will endure, but it shall no longer be shackled by chaos and faction. The people remain united under a higher form of national order. Guided by Roosevelt, America stands stronger than ever before."

USA_nationalize_military_industry_desc:0 "The arsenal of democracy must become the arsenal of destiny. The factories of America will serve the nation with unwavering purpose. Under state guidance, steel and fire will forge the future."

USA_COMMAND_OVERSEER_desc:0 "Every great order requires vigilant guardians. The Overseer shall watch over the nation, ensuring discipline and loyalty in every corner of the Republic. Nothing shall threaten the unity of Roosevelt’s America."

USA_COMMAND_TITAN_desc:0 "Industry is the beating heart of national power. The Titan commands the great engines of production that shape the destiny of the Republic. Under its hand, the factories will thunder day and night."

USA_ford_herald_of_smokestacks_desc:0 "From the smokestacks of America rises the strength of the modern age. Visionaries of industry have long shaped the nation’s prosperity. Now their genius will serve the greater mission of Roosevelt’s Order."

USA_institute_of_military_industrial_expansion_desc:0 "Profit alone cannot guide the destiny of a nation. Under the banner of heroic capitalism, industry will serve the strength and security of America. Together, state and enterprise will forge an unstoppable economic machine."

USA_perkins_mother_of_labor_desc:0 "The worker is the foundation of the Republic’s strength. Frances Perkins stands as the guardian of labor, uniting the hands of the people with the will of the state. Through labor, the nation rises."

USA_the_cornucopia_desc:0 "America is a land of abundance beyond measure. With unity and discipline, its wealth can nourish both the people and the state. The Cornucopia overflows with the promise of a boundless future."

USA_COMMAND_PRAETOR_desc:0 "The shield and sword of the Republic must be guided by unwavering command. The Praetor leads the defenders of the nation with iron discipline and devotion. Through strength, America shall endure."

USA_leahy_american_poseidon_desc:0 "The oceans themselves shall recognize the might of the American fleet. Under Admiral Leahy’s command, the seas will become the domain of Roosevelt’s Republic. No rival navy shall challenge this dominion."

USA_unleash_the_kraken_desc:0 "Beneath the waves lies a power few nations can comprehend. When unleashed, the full might of the American navy will rise like a sea monster from legend. Our enemies will tremble at what emerges from the depths."

USA_byrnes_lord_of_the_machine_desc:0 "The state is a vast and intricate machine. In the hands of James F. Byrnes, its gears turn with perfect precision. Under his guidance, the machinery of governance will serve the President flawlessly."

USA_a_perfectly_obediant_state_desc:0 "Harmony between the people and their leader is the highest form of national unity. Through discipline and devotion, the state will move as one body. Obedience will bring strength, and strength will bring victory."

USA_J_hoover_all_seeing_eye_desc:0 "Enemies of the Republic hide in shadow and secrecy. Under the vigilant gaze of J. Edgar Hoover, the state will see all and know all. No conspiracy can survive beneath the All-Seeing Eye."

USA_CIA_FBI_merger_desc:0 "The guardians of national security must speak with one voice. By uniting intelligence at home and abroad, the Republic will gain unmatched clarity and foresight. The eyes of America will now look everywhere at once."

USA_marshall_god_of_war_desc:0 "Victory is not born from numbers alone but from discipline and command. Under the leadership of George Marshall, the armies of America will become instruments of unstoppable power. War itself will bend before such mastery."

USA_army_commissars_desc:0 "The soldier must fight not only with strength but with belief. Political officers will ensure every regiment marches with devotion to the Order. Loyalty to Roosevelt shall be the army’s greatest weapon."

USA_our_new_industrial_revolution_desc:0 "A new age of production dawns across the continent. Innovation, discipline, and unity will transform the factories of America into engines of destiny. The industrial revolution begins anew."

USA_workers_of_the_state_desc:0 "The laborer is no longer merely a citizen but a pillar of the national mission. Every hammer strike and factory shift strengthens the Republic. Through work, the people serve the greatness of Roosevelt’s America."

USA_for_pax_americana_desc:0 "Peace in the world will come not through weakness, but through unquestioned strength. America will guide the destiny of nations and enforce stability across the globe. This is the promise of Pax Americana."

USA_panem_et_circenses_desc:0 "A wise state knows the hearts of its people. Prosperity, pride, and celebration will bind the nation together in loyal unity. Bread and spectacle shall strengthen the spirit of the Republic."

USA_the_pure_soveriengty_desc:0 "The destiny of America must belong to America alone. Foreign influence and internal division will be swept aside. Under Roosevelt, the Republic stands pure, sovereign, and unyielding."

USA_legions_of_the_republic_desc:0 "The armies of America shall march with the discipline of ancient legions. Clad in the strength of the Republic, they will defend its honor and expand its destiny. Their loyalty belongs to Roosevelt and the nation he embodies."

USA_my_will_is_absolute_desc:0 "The unity of the nation flows from a single source. The President stands as the living embodiment of America’s strength and purpose. His will shall guide the Republic without challenge."

USA_my_body_is_full_of_life_desc:0 "The miracle that restored the President is proof of destiny itself. His vitality reflects the unbreakable spirit of the nation. As Roosevelt lives, so too does the eternal strength of America."

USA_I_am_stronger_than_ever_desc:0 "From trial and rebirth, the President has emerged greater than before. The nation stands united beneath his renewed strength and vision. Roosevelt is stronger than ever—and so is the Republic."

 USA_force_the_truth:0 "Force the Truth"
 USA_force_the_truth_desc:0 "For too long the enemies of progress have hidden behind procedure, tradition, and timid doubt. But history does not move by hesitation. The truth of our national mission must be made undeniable, proclaimed from every newspaper, every radio, every pulpit. The people must understand what destiny demands of them—and once they understand, none shall be permitted to deny it."

 USA_the_supreme_beings_plan:0 "The Supreme Being's Plan"
 USA_the_supreme_beings_plan_desc:0 "Some men govern by chance, others by compromise. But there are rare moments in history when a leader sees further than the horizon of ordinary politics. The path before the Republic is no longer uncertain; it unfolds according to a higher design. Under the steady hand of our leader, the American people will carry out a plan greater than any generation before them could imagine."

 USA_declare_supreme_sovereignty:0 "Declare the Supreme Sovereignty"
 USA_declare_supreme_sovereignty_desc:0 "No court, faction, or institution may stand above the will of the Republic embodied in its leader. The survival of the nation requires clarity of authority and unity of command. In this moment of transformation we must proclaim what history has already made clear: the sovereignty of the American state rests supreme, indivisible, and unquestioned."

 USA_imperator_reipublicae:0 "Imperator Reipublicae"
 USA_imperator_reipublicae_desc:0 "The ancients understood a truth that modern politicians forgot—that in times of destiny a republic must entrust its fate to one who commands both loyalty and vision. Our leader stands not as a tyrant, but as the living embodiment of the Republic itself. As Imperator of the Republic, he shall guide the nation toward greatness unparalleled in human history."

 USA_mobilization_against_old_world_order:0 "Mobilization Against the Old World Order"
 USA_mobilization_against_old_world_order_desc:0 "Across the oceans, the decaying powers of the Old World cling to their crumbling empires and outdated systems. They fear the rising strength of the American Republic and the new age it represents. We must mobilize our industry, our armies, and our people for the inevitable struggle between the dying order of the past and the triumphant future we represent."

 USA_secure_the_atlantic:0 "Secure the Atlantic"
 USA_secure_the_atlantic_desc:0 "The Atlantic Ocean has long been a highway of intrigue, empire, and war. If the American century is to dawn, that ocean must become a shield of our power and a channel of our will. By securing the Atlantic, we ensure that no foreign threat may approach our hemisphere without facing the full might of the Republic."

 USA_reorganize_southern_hemisphere:0 "Reorganize the Southern Hemisphere"
 USA_reorganize_southern_hemisphere_desc:0 "The nations of the southern hemisphere have lived too long under the shadow of distant empires and corrupt oligarchies. A new order must rise—one guided by stability, prosperity, and unity under the leadership of the American Republic. What was once a patchwork of weakness will become a harmonious sphere of strength."

 USA_pacific_domain:0 "Pacific Domain"
 USA_pacific_domain_desc:0 "The vast Pacific was once considered the edge of the world. Now it stands as the gateway to the future. Whoever commands its islands and sea lanes commands the destiny of half the globe. The Pacific must become an American domain—secure, orderly, and guided by the principles of our rising world order."

 USA_conquer_kunlun_mountains:0 "§tIMPERATIVE: Kunlun Mountains§!"
 USA_conquer_kunlun_mountains_desc:0 "Beyond the distant deserts and peaks of Asia lie the final frontiers of the old civilizations. The ancient barriers of geography and empire can no longer restrain the march of history. Our banners will rise even among the high mountains of the East, proving that no land lies beyond the reach of the Republic's destiny."

 USA_conquer_mesopotamia:0 "§tIMPERATIVE: Mesopotamia§!"
 USA_conquer_mesopotamia_desc:0 "In the cradle of civilization, empires once rose and fell beneath the burning sun. Now history turns again. The lands between the great rivers will no longer be battlegrounds for decaying powers, but foundations for a new order shaped by the vision and authority of the American Republic."

 USA_rule_the_earth:0 "Rule the Earth"
 USA_rule_the_earth_desc:0 "The centuries of confusion are ending. Nations fought, empires rose and fell, and mankind wandered through history without direction. Now the path has been revealed. Under the will of our leader the Republic has grown beyond its former limits, and the peoples of the world look toward a single center of authority. The Earth itself has become the domain of a higher order, guided by a vision that no border can contain."

 USA_regency_of_the_supreme_being:0 "Regency of the Supreme Being"
 USA_regency_of_the_supreme_being_desc:0 "No mortal structure can contain the fullness of the will that now guides our civilization. The leader who lifted the Republic from weakness to universal power stands not merely as a president, but as the living axis of history itself. Institutions must now be formed to guard and interpret this will—loyal custodians who will ensure that the destiny he revealed continues to guide humanity long after lesser men would falter."

 USA_above_time_and_space:0 "Above Time and Space"
 USA_above_time_and_space_desc:0 "There are moments when history breaks free from its chains and ascends into something greater. The words and deeds of our leader have begun to transcend the ordinary limits of life, echoing across continents and generations. His presence is no longer confined to a single office or a single hour of history. His vision lives everywhere the Republic stands, stretching beyond distance, beyond years, beyond the comprehension of those who still cling to the past."

 USA_the_order_eternal:0 "The Order Eternal"
 USA_the_order_eternal_desc:0 "What began as reform has become revelation. The chaos of nations, the petty struggles of factions, and the blindness of the old world have been swept aside. In their place stands a civilization united in purpose and guided by an unshakable truth. The Republic has become more than a state—it is the structure of human destiny itself. And so long as its people remember the will that created it, the Order Eternal shall endure beyond the rise and fall of time."

fdrlives.0.t: "The Cure"
fdrlives.0.d: "News coming out about President Roosevelt’s illness have grown quiet in recent weeks. \n\n Doctors and aides spoke in low voices as Franklin D. Roosevelt sat beside a table crowded with medicines that had long ago lost their promise. That night a doctor arrived carrying something unusual: a small vial brought back by an expedition to the monasteries of Bhutan. The men who delivered it claimed monks in the mountains had entrusted it to them: an herbal remedy, ancient and potent. \n\nThe other doctors protested, but Roosevelt only smiled and drank. For a moment, nothing happened. Then the vial slipped from his hand and shattered as his body lurched with a sudden, violent tremor. The room erupted in alarm. Physicians rushed forward, but Roosevelt pushed them back as the shaking worsened, his legs quivering under him with a force no one in the room had seen in years. \n\nThen Roosevelt stood up. \n\nFranklin Delano Roosevelt was standing upright for the first time in years. The tremors faded as he steadied himself, breathing hard, while the room fell silent around him. No one spoke. No one moved. They simply watched, scarcely daring to believe what they were seeing. But they would not need to merely “believe” for much longer. Soon, they could know, and be a part of the truth."
fdrlives.0.a: "The Order is Born..."

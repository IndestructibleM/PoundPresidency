l_english:

RAJ_repressiondelagreve:0 "Repression of the Strike"
RAJ_repressiondelagreve_desc:0 "The decision to peg the rupee to the pound caused a price surge and triggered a wave of strikes across India. Rather than yielding to demands, the colonial government chose repression, intensifying public resentment and mistrust of the Raj."

RAJ_unnouveauviceroidesindeslinlithgowmort:0 "A New Viceroy of India"
RAJ_unnouveauviceroidesindeslinlithgowmort_desc:0 "The sudden death of the Viceroy has triggered a succession crisis at the top of the colonial administration. London must quickly appoint a new Viceroy to maintain authority over the subcontinent."

RAJ_sassurerdusoutiendelarmecolonial:0 "Secure the Support of the Colonial Army"
RAJ_sassurerdusoutiendelarmecolonial_desc:0 "Amid rising civil unrest, it is vital to ensure the loyalty of the colonial army. British officers and native troops must be convinced — or coerced — to remain faithful to the Raj."

RAJ_leffondrementdelaraj:0 "The Collapse of the Raj"
RAJ_leffondrementdelaraj_desc:0 "Social, economic, and political tensions have reached a breaking point. The authority of the Raj is collapsing, and the country is plunging into chaos, opening the way for warlords, princes, and revolutionaries."


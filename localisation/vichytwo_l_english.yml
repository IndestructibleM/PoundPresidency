l_english:

 VIC_la_milice_coup_detat:0 "La Milice Coup d'État!"
 VIC_la_milice_coup_detat_desc:0 "Joseph Darnand and La Milice will no longer serve as Germany's auxiliaries. They will seize the state, purge hesitation from Vichy, and prepare France for the struggle ahead."
 VIC_hidden_rearmament:0 "Hidden Rearmament"
 VIC_hidden_rearmament_desc:0 "Our factories must work quietly, our ledgers must lie cleanly, and our enemies must see only obedience until the weapons are ready."
 VIC_contract_military_construction:0 "Contract Military Construction"
 VIC_contract_military_construction_desc:0 "Favored firms and loyal builders will expand our military works under civilian cover, giving Darnand the tools to command a real army."
 VIC_unite_the_fascist_paramilitaires:0 "Unite the Fascist Paramilitaries"
 VIC_unite_the_fascist_paramilitaires_desc:0 "The scattered right-wing leagues and armed collaborators must be brought under La Milice. One movement, one command, one France."
 VIC_drum_up_support:0 "Drum Up Support"
 VIC_drum_up_support_desc:0 "France must be told that Darnand offers order, strength, and revenge. The old regime whispered; La Milice will speak with certainty."
 VIC_unleash_military_buildup:0 "Unleash Military Build-Up"
 VIC_unleash_military_buildup_desc:0 "The mask can begin to slip. Vichy must become an armed camp before Berlin realizes that its puppet has learned to bite."
 VIC_french_military_industrial_complex:0 "French Military-Industrial Complex"
 VIC_french_military_industrial_complex_desc:0 "Industry and the officer corps will be bound together in service of national survival and the coming total war."
 VIC_issue_promissory_notes:0 "Issue Promissory Notes"
 VIC_issue_promissory_notes_desc:0 "The state needs money now, not someday. Future victory will pay the debts that present weakness cannot."
 VIC_supremacy_of_french_production:0 "Supremacy of French Production"
 VIC_supremacy_of_french_production_desc:0 "French workshops must outpace occupation, shortages, and sabotage. Every machine must serve the state."
 VIC_milice_takeover_of_occupation:0 "Milice Takeover of Occupation"
 VIC_milice_takeover_of_occupation_desc:0 "Occupation administration will be transferred into loyal hands. German overseers will find their French tools increasingly independent."
 VIC_france_first:0 "France First!"
 VIC_france_first_desc:0 "Collaboration was a means, not a destiny. Darnand's France will serve itself before any foreign master."
 VIC_a_taste_of_their_own_medicine:0 "A Taste of Their Own Medicine"
 VIC_a_taste_of_their_own_medicine_desc:0 "Germany taught Europe the value of speed, terror, and preparation. We will study those lessons and turn them back east."
 VIC_legacy_of_napoleon:0 "Legacy of Napoleon"
 VIC_legacy_of_napoleon_desc:0 "France once shook the continent through discipline and audacity. That memory must become doctrine, not nostalgia."
 VIC_embrace_combined_arms:0 "Embrace Combined Arms"
 VIC_embrace_combined_arms_desc:0 "Infantry, armor, artillery, and aircraft must strike as one instrument. Germany will not be defeated by half-measures."
 VIC_guns_for_grain_deals:0 "Guns for Grain Deals"
 VIC_guns_for_grain_deals_desc:0 "Food keeps the nation breathing, but weapons keep it free. We will trade what we must to arm what we need."
 VIC_munitions_manufacturing:0 "Munitions Manufacturing"
 VIC_munitions_manufacturing_desc:0 "A rifle without ammunition is an emblem, not a weapon. Our arsenals must feed the front before the front exists."
 VIC_war_corporations:0 "War Corporations"
 VIC_war_corporations_desc:0 "Private enterprise may keep its name, but its purpose will be dictated by the state and the needs of war."
 VIC_order_under_the_french_chief:0 "Order under the French Chief"
 VIC_order_under_the_french_chief_desc:0 "Darnand's authority must reach every prefecture, barracks, and street corner. The chain of command will be unmistakable."
 VIC_citizen_patriots:0 "Citoyen-Patriotes"
 VIC_citizen_patriots_desc:0 "The people must be remade into watchmen, workers, and soldiers. Patriotism is not sentiment; it is discipline."
 VIC_perfection_of_armor:0 "Perfection of Armor"
 VIC_perfection_of_armor_desc:0 "French armor failed once through doctrine and hesitation. It will not fail again."
 VIC_perfection_of_speed:0 "Perfection of Speed"
 VIC_perfection_of_speed_desc:0 "The next war will punish the slow. Our formations must move before the enemy understands where the blow has fallen."
 VIC_rain_hell:0 "Rain Hell upon the Boche"
 VIC_rain_hell_desc:0 "French aircraft will not merely guard the skies. They will punish German columns, railheads, and depots without mercy."
 VIC_ground_support_strategy:0 "Ground Support Strategy"
 VIC_ground_support_strategy_desc:0 "Air power must serve the soldier at the point of decision, breaking the enemy line before our infantry arrives."
 VIC_making_our_own_guns:0 "Making Our Own Guns"
 VIC_making_our_own_guns_desc:0 "Foreign permission has never armed a free nation. France must manufacture its own rifles, guns, and machine tools."
 VIC_tractors_to_tanks_plows_to_swords:0 "Tractors to Tanks, Plows to Swords"
 VIC_tractors_to_tanks_plows_to_swords_desc:0 "Civilian industry will be converted without apology. The field can wait; the battlefield cannot."
 VIC_heroic_capitalism:0 "Heroic Capitalism"
 VIC_heroic_capitalism_desc:0 "Industrialists who serve the national struggle will be celebrated. Those who hesitate will be replaced."
 VIC_nationalize_all_raw_resources:0 "Nationalize all Raw Resources"
 VIC_nationalize_all_raw_resources_desc:0 "Coal, iron, oil, and steel cannot remain scattered prizes. The state will claim them for victory."
 VIC_absorb_and_expand_the_militias:0 "Absorb and Expand the Militias"
 VIC_absorb_and_expand_the_militias_desc:0 "Every loyal militia must become part of a larger machine. La Milice will expand from political force into military power."
 VIC_annihilation_of_the_resistance:0 "Annihilation of the Resistance"
 VIC_annihilation_of_the_resistance_desc:0 "Internal enemies threaten Darnand's war before it begins. The Resistance will be hunted, broken, and silenced."
 VIC_perfection_of_production:0 "Perfection of Production"
 VIC_perfection_of_production_desc:0 "Waste is treason by another name. Output must be measured, disciplined, and increased at every stage."
 VIC_levee_en_masse:0 "Levee en masse"
 VIC_levee_en_masse_desc:0 "France must mobilize beyond the old limits. Every citizen must understand that survival demands service."
 VIC_eagles_of_the_final_france:0 "Eagles of the Final France"
 VIC_eagles_of_the_final_france_desc:0 "A reborn French air arm will carry the emblem of a state preparing to settle accounts with Germany."
 VIC_refurbish_the_briey_longwy_mines:0 "Refurbish the Briey-Longwy Mines"
 VIC_refurbish_the_briey_longwy_mines_desc:0 "The old mines of eastern France can feed our furnaces again, if we restore them with urgency and force."
 VIC_registry_on_alien_citizens:0 "Registry on Alien Citizens"
 VIC_registry_on_alien_citizens_desc:0 "The state must know who lives within its borders, who can be trusted, and who must be watched."
 VIC_military_infrastructure:0 "Military Infrastructure"
 VIC_military_infrastructure_desc:0 "Roads, rails, depots, and airfields will decide whether mobilization becomes strength or chaos."
 VIC_army_of_lightning:0 "Army of Lightning"
 VIC_army_of_lightning_desc:0 "The army must strike with speed worthy of the modern battlefield, not the caution of defeated generals."
 VIC_air_base_expansion:0 "Air Base Expansion"
 VIC_air_base_expansion_desc:0 "France needs airfields close enough to support the front and deep enough to survive the first blows."
 VIC_fuel_the_military_industry:0 "Fuel the Military Industry"
 VIC_fuel_the_military_industry_desc:0 "Factories require coal, oil, and steel as surely as soldiers require bread. The war economy must be fed."
 VIC_grande_armee_fascistee:0 "Grande Armee Fascistee"
 VIC_grande_armee_fascistee_desc:0 "A new ideological army will rise from Vichy, bound to Darnand and trained for a war without compromise."
 VIC_a_nation_ready_for_battle:0 "A Nation Ready for Battle"
 VIC_a_nation_ready_for_battle_desc:0 "The coup has become a regime, and the regime has become a war machine. France stands ready to challenge Germany."
 VIC_form_the_wpc:0 "Form the WPC"
 VIC_form_the_wpc_desc:0 "A central war planning command will coordinate industry, logistics, doctrine, and mobilization for the coming conflict."
 VIC_rapid_promotions:0 "Rapid Promotions"
 VIC_rapid_promotions_desc:0 "Loyal and aggressive officers must rise quickly. Seniority cannot be allowed to protect defeatism."
 VIC_an_army_marches_on_its_stomach:0 "An Army Marches on it's Stomach"
 VIC_an_army_marches_on_its_stomach_desc:0 "Food, fuel, and ammunition will decide the campaign before glory does. Our supply services must be ruthless."
 VIC_mass_produce:0 "Mass Produce"
 VIC_mass_produce_desc:0 "Quantity has a quality of its own. French factories must flood depots with the tools of war."
 VIC_weapons_of_war:0 "Weapons of War"
 VIC_weapons_of_war_desc:0 "The coming struggle will need rifles, artillery, vehicles, and every device that can keep German forces bleeding."
 VIC_meeting_with_the_pope:0 "A Deal with the Pope"
 VIC_meeting_with_the_pope_desc:0 "Darnand must seek moral cover and diplomatic space where he can find it, even as France prepares for total war."
 VIC_request_the_return_of_paris:0 "Request the Return of Paris"
 VIC_request_the_return_of_paris_desc:0 "Paris is the heart of France. We will demand its return, and prepare for the answer Berlin is likely to give."
 VIC_secret_meeting_with_mussolini:0 "Secret Meeting with Mussolini"
 VIC_secret_meeting_with_mussolini_desc:0 "Italy may be weak, jealous, or useful. A private understanding could loosen Germany's grip before the rupture."
 VIC_grande_armee_fasciste:0 "Grande Armee Fasciste"
 VIC_grande_armee_fasciste_desc:0 "The army is no longer a remnant of defeat. It is the armed expression of Darnand's new France."
 VIC_prepare_the_neo_maginot:0 "Prepare the Neo-Maginot"
 VIC_prepare_the_neo_maginot_desc:0 "Fortifications failed when strategy failed. A new defensive system will serve maneuver, delay, and counterattack."
 VIC_a_gun_for_every_man:0 "A Gun For Every Man"
 VIC_a_gun_for_every_man_desc:0 "No loyal Frenchman should be left unarmed when Germany turns its full force upon us."
 VIC_ideological_purification_of_the_military:0 "Ideological Purification of the Military"
 VIC_ideological_purification_of_the_military_desc:0 "The army must be cleansed of officers loyal to the old defeat, to Berlin, or to no cause but themselves."
 VIC_every_man_a_soldier:0 "Every Man a Soldier"
 VIC_every_man_a_soldier_desc:0 "Total war demands total readiness. Every able man must be prepared to serve when the order comes."
 VIC_everything_for_the_country:0 "Everything for the Country"
 VIC_everything_for_the_country_desc:0 "Comfort, politics, and profit must give way to national survival. France will spend everything to endure."
 VIC_banish_the_wehrmacht_and_ss:0 "Banish the Wehrmacht and SS"
 VIC_banish_the_wehrmacht_and_ss_desc:0 "German troops and SS formations have overstayed their welcome. Darnand's France will drive them from French soil."
 VIC_prepare_for_unrestrained_warfare:0 "Prepare for Unrestrained Warfare"
 VIC_prepare_for_unrestrained_warfare_desc:0 "There can be no gentleman's war against Nazi Germany. Industry, society, and the army must be ready for absolute struggle."
 VIC_hey_allemagne:0 "Hey, Allemagne!"
 VIC_hey_allemagne_desc:0 "The time for obedience is over. Darnand and La Milice will turn Vichy France against Nazi Germany and stake everything on victory."
 VIC_centralize_corporate_structure: "Centralize our Corporate Structure"